<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" fill="none">
  <!-- Fundo escuro do ícone com borda suave -->
  <rect width="512" height="512" rx="120" fill="#111113"/>
  <rect x="16" y="16" width="480" height="480" rx="104" stroke="rgba(255,255,255,0.1)" stroke-width="16"/>

  <defs>
    <!-- Gradiente metálico para o texto central -->
    <linearGradient id="metal" x1="0" y1="0" x2="0" y2="512" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="50%" stop-color="#c4d2ff"/>
      <stop offset="100%" stop-color="#ffffff"/>
    </linearGradient>
    
    <!-- Filtros de brilho SVG puro para garantir suporte em todos os navegadores no favicon -->
    <filter id="glow-purple" x="-50%" y="-50%" width="200%" height="200%">
      <feDropShadow dx="0" dy="0" stdDeviation="16" flood-color="#b79cff" flood-opacity="0.6"/>
    </filter>
    <filter id="glow-blue" x="-50%" y="-50%" width="200%" height="200%">
      <feDropShadow dx="0" dy="0" stdDeviation="16" flood-color="#6cb8f6" flood-opacity="0.6"/>
    </filter>
  </defs>

  <!-- Símbolo roxo < -->
  <g filter="url(#glow-purple)">
    <circle cx="120" cy="256" r="76" fill="rgba(183,156,255,0.15)" stroke="rgba(183,156,255,0.5)" stroke-width="16"/>
    <text x="120" y="284" font-family="monospace, ui-monospace, 'JetBrains Mono', sans-serif" font-weight="bold" font-size="110" fill="#b79cff" text-anchor="middle" dominant-baseline="middle">&lt;</text>
  </g>

  <!-- Texto central br -->
  <text x="256" y="280" font-family="monospace, ui-monospace, 'JetBrains Mono', sans-serif" font-weight="bold" font-size="140" fill="url(#metal)" text-anchor="middle" dominant-baseline="middle">br</text>

  <!-- Símbolo azul /> -->
  <g filter="url(#glow-blue)">
    <rect x="316" y="180" width="152" height="152" rx="76" fill="rgba(108,184,246,0.15)" stroke="rgba(108,184,246,0.5)" stroke-width="16"/>
    <text x="392" y="284" font-family="monospace, ui-monospace, 'JetBrains Mono', sans-serif" font-weight="bold" font-size="110" fill="#6cb8f6" text-anchor="middle" dominant-baseline="middle">/&gt;</text>
  </g>
</svg>